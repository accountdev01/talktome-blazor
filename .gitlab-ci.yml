variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  SONAR_PROJECT_KEY: "DPTFProject_DPTF_Factory_Other_TalkToMe_c14fac67-5bff-49f9-950c-2ded31577448"
  GIT_DEPTH: "0"
  REGISTRY_HOST: "192.168.200.110:1337"
  CI_REGISTRY: "$REGISTRY_HOST"
  CI_REGISTRY_IMAGE: "$REGISTRY_HOST/$CI_PROJECT_PATH"

  DOCKER_TLS_CERTDIR: ""

stages:
  - build-sonar
  - build_and_push_image

build-sonar:
   image: mcr.microsoft.com/dotnet/sdk:7.0
   stage: build-sonar
   cache:
     policy: pull-push
     key: "sonar-cache-$CI_COMMIT_REF_SLUG"
     paths:
       - "${SONAR_USER_HOME}/cache"
       - sonar-scanner/
   script:
     - echo "--- Installing SonarScanner and setting PATH ---"
     - dotnet tool install --global dotnet-sonarscanner

     - echo "--- Starting SonarScanner analysis ---"
     - dotnet sonarscanner begin /k:"$SONAR_PROJECT_KEY" /d:sonar.token="$SONAR_TOKEN" /d:"sonar.host.url=$SONAR_HOST_URL"
     - dotnet build
     - dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"   
   allow_failure: true
   rules:
     - if: $CI_COMMIT_MESSAGE =~ /\(sonar\)/
   tags:
     - c-bleed

build_and_push_image:
  image: docker:latest
  stage: build_and_push_image
  tags:
    - linux-runner
  before_script:
    - echo "--- Logging in to GitLab Container Registry ---"
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "192.168.200.110:1337"
  script:
    - |
      VERSION_EXTRACTED=$(echo "$CI_COMMIT_MESSAGE" | sed -n 's/.*(build:\([^)]*\)).*/\1/p')
      
      if [ -z "$VERSION_EXTRACTED" ]; then
        APP_VERSION="latest"
        echo "No specific version found in commit message, using 'latest'"
      else
        APP_VERSION="$VERSION_EXTRACTED"
        echo "Found version '$APP_VERSION' in commit message"
      fi

      PROJECT_PATH_LC=$(echo "$CI_PROJECT_PATH" | tr '[:upper:]' '[:lower:]')
      FULL_IMAGE_NAME="192.168.200.110:1337/${PROJECT_PATH_LC}:${APP_VERSION}"

      echo "Building Docker image: $FULL_IMAGE_NAME"
      docker build -f Dockerfile -t "$FULL_IMAGE_NAME" .
      docker push "$FULL_IMAGE_NAME"
  rules:
     - if: $CI_COMMIT_MESSAGE =~ /\(build(:[^\s)]+)?\)/